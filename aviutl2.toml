#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。

[project]
id = "sevenc-nanashi.disassembler-anm2"
name = "disassembler.anm2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[preview]
aviutl2_version = "latest"

[artifacts.English-disassembler-anm2]
destination = "Language/English.disassembler-anm2.aul2"
source = "./i18n/English.disassembler-anm2.aul2"

[artifacts.English-aul2]
enabled = false
destination = "Language/English.aul2"
source = "https://raw.githubusercontent.com/aviutl2/aviutl2_community_translation/refs/heads/main/locales/community_en.aul2"

[artifacts.English-aul2.profiles.debug]
enabled = true

[artifacts.disassembler-anm2]
build = "aulua build"
source = "./target/disassembler.anm2"
destination = "Script/disassembler.anm2.anm2"

[artifacts.disassembler-mod2]
destination = "Script/disassembler.mod2"

[artifacts.disassembler-mod2.profiles.debug]
build = "cargo build"
source = "target/debug/disassembler.dll"

[artifacts.disassembler-mod2.profiles.release]
build = "cargo build --release"
source = "target/release/disassembler.dll"

[artifacts.LyricMotioN]
enabled = false
destination = "Script/LyricMotioN.anm2"
source = "https://raw.githubusercontent.com/nea-c/aviutl2_script_LyricMotioN/refs/heads/master/LyricMotioN.anm2"
profiles = { debug = { enabled = true } }

[artifacts.AutoLyricAnimation_K]
enabled = false
destination = "Script/AutoLyricAnimation_K.anm2"
source = "https://raw.githubusercontent.com/korarei/AviUtl2_AutoLyricAnimation_K_Script/refs/heads/main/script/AutoLyricAnimation_K.anm2"
profiles = { debug = { enabled = true } }

[catalog]
id = "sevenc-nanashi.disassembler-anm2"
name = "disassembler.anm2"
summary = "画像のパーツを分解して個別オブジェクトにするスクリプト"
type = "common"
description = { type = "url", url = "https://raw.githubusercontent.com/sevenc-nanashi/disassembler.anm2/main/README.md" }
author = "Nanashi."
download_source = { type = "github", owner = "sevenc-nanashi", repo = "disassembler.anm2" }
homepage = "https://github.com/sevenc-nanashi/disassembler.anm2"
license = { type = "MIT", template = false, text = { type = "file", path = "./LICENSE" } }

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / 画像のパーツを分解して個別オブジェクトにするスクリプト"
